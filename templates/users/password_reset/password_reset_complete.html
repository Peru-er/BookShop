
{% extends 'base.html' %}

{% block breadcrumbs %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'shop:home' %}">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Password Reset Complete</li>
    </ol>
</nav>
{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container text-center">
        <h2 class="form-title" style="color: #79c77b;">Success</h2>
        <p class="form-subtitle">Your password has been set.</p>
        <p style="color: #b8c4b7; margin-bottom: 30px;">
            You may now proceed to log in with your new password.
        </p>
        <a href="{% url 'users:login' %}" class="btn btn-custom px-5">Log In</a>
    </div>
</div>
{% endblock %}
