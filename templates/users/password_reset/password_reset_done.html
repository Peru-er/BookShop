
{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="form-container text-center">
        <h2 class="form-title" style="color: #79c77b;">Email Sent</h2>

        <p class="form-subtitle" style="margin-bottom: 25px;">
            We have emailed you instructions for setting your password.
        </p>
        <p style="color: #b8c4b7; font-size: 0.95rem; line-height: 1.6;">
            If you do not receive an email, please make sure you have entered the address you registered with and check your spam folder.
        </p>
        <div class="form-footer" style="margin-top: 40px;">
            <a href="{% url 'shop:home' %}" class="btn btn-outline-custom px-4">Home</a>
        </div>
    </div>
</div>
{% endblock %}
