
{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="form-container">

        <h2 class="form-title">Reset Password</h2>
        <p class="form-subtitle">Enter your email address, and we will send you a link to reset your password.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" autocomplete="email" required class="form-control" placeholder="example@mail.com">
                {% if form.email.errors %}
                    <small class="form-error" style="color: #f29999;">{{ form.email.errors|join:", " }}</small>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-custom w-100 mt-3">Send Reset Link</button>
        </form>

        <div class="form-footer">
            <a href="{% url 'users:login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
